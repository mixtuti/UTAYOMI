<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>和歌データ入力補助</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --paper: #fffdf8;
      --ink: #2f2418;
      --muted: #6e6256;
      --accent: #8c2f1c;
      --border: #d8c8b2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.7;
    }

    .wrap {
      width: min(1100px, calc(100% - 24px));
      margin: 24px auto 40px;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 18px;
    }

    h1, h2 {
      margin-top: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label span {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font: inherit;
      background: #fff;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font: inherit;
    }

    button.sub {
      background: #e9ddd3;
      color: var(--accent);
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f8f4ee;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      overflow: auto;
    }

    .list-item {
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 12px;
    }

    .muted {
      color: var(--muted);
    }

    .count {
      font-weight: 700;
      color: var(--accent);
    }

    @media (max-width: 780px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>和歌データ入力補助</h1>
      <p class="muted">
        1首ずつ入力して追加できます。tokens は「|」または「、」「,」区切りで入力してください。
      </p>
    </section>

    <section class="card">
      <h2>入力フォーム</h2>
      <form id="poemForm" class="grid">
        <label>
          <span>ID</span>
          <input id="id" type="number" min="1" placeholder="例: 7" />
        </label>

        <label>
          <span>歌番号</span>
          <input id="poem_no" type="number" min="1" placeholder="例: 168" />
        </label>

        <label>
          <span>出典</span>
          <select id="collection">
            <option value="">選択してください</option>
            <option value="万葉集">万葉集</option>
            <option value="古今和歌集">古今和歌集</option>
            <option value="新古今和歌集">新古今和歌集</option>
          </select>
        </label>

        <label>
          <span>部立 / 巻</span>
          <input id="book" type="text" placeholder="例: 春上 / 秋下 / 巻一" />
        </label>

        <label>
          <span>テーマ</span>
          <select id="theme">
            <option value="">選択してください</option>
            <option value="春">春</option>
            <option value="夏">夏</option>
            <option value="秋">秋</option>
            <option value="冬">冬</option>
            <option value="恋">恋</option>
            <option value="雑">雑</option>
          </select>
        </label>

        <label>
          <span>作者</span>
          <input id="author" type="text" placeholder="例: 読人しらず" />
        </label>

        <label class="full">
          <span>本文</span>
          <textarea id="text" placeholder="例: 秋の夜の月の光しあかければくらぶの山も越えぬべらなり"></textarea>
        </label>

        <label class="full">
          <span>かな</span>
          <textarea id="kana" placeholder="例: あきのよのつきのひかりしあかければくらぶのやまもこえぬべらなり"></textarea>
        </label>

        <label class="full">
          <span>tokens</span>
          <textarea id="tokensInput" placeholder="例: 秋|の|夜|の|月|の|光|し|あかけれ|ば|くらぶ|の|山|も|越え|ぬ|べら|なり"></textarea>
        </label>

        <label class="full">
          <span>keywords（任意）</span>
          <input id="keywordsInput" type="text" placeholder="例: 月|光|山" />
        </label>
      </form>

      <div class="button-row">
        <button id="previewButton" type="button">JSONプレビュー</button>
        <button id="addButton" type="button">配列に追加</button>
        <button id="clearButton" type="button" class="sub">入力クリア</button>
        <button id="fillThemeButton" type="button" class="sub">book から theme 補助</button>
        <button id="autoTokenizeButton" type="button" class="sub">本文から tokens 下書き作成</button>
        <button id="autoTokenizeKanaButton" type="button" class="sub">かなから tokens 下書き作成</button>
      </div>
    </section>

    <section class="card">
      <h2>1首プレビュー</h2>
      <pre id="previewArea">{}</pre>
    </section>

    <section class="card">
      <h2>蓄積データ <span id="count" class="count">0</span> 件</h2>
      <div class="button-row">
        <button id="exportButton" type="button">JSONを書き出し表示</button>
        <button id="copyButton" type="button" class="sub">JSONをコピー</button>
        <button id="resetAllButton" type="button" class="sub">全消去</button>
      </div>
      <pre id="exportArea">[]</pre>
    </section>

    <section class="card">
      <h2>追加済み一覧</h2>
      <div id="listArea" class="muted">まだ追加されていません。</div>
    </section>
  </div>

  <script>
    const state = {
      poems: []
    };

    const el = {
      id: document.getElementById("id"),
      collection: document.getElementById("collection"),
      book: document.getElementById("book"),
      theme: document.getElementById("theme"),
      poem_no: document.getElementById("poem_no"),
      author: document.getElementById("author"),
      text: document.getElementById("text"),
      kana: document.getElementById("kana"),
      tokensInput: document.getElementById("tokensInput"),
      keywordsInput: document.getElementById("keywordsInput"),

      previewButton: document.getElementById("previewButton"),
      addButton: document.getElementById("addButton"),
      clearButton: document.getElementById("clearButton"),
      fillThemeButton: document.getElementById("fillThemeButton"),
      autoTokenizeButton: document.getElementById("autoTokenizeButton"),
      autoTokenizeKanaButton: document.getElementById("autoTokenizeKanaButton"),

      previewArea: document.getElementById("previewArea"),
      exportButton: document.getElementById("exportButton"),
      copyButton: document.getElementById("copyButton"),
      resetAllButton: document.getElementById("resetAllButton"),
      exportArea: document.getElementById("exportArea"),
      listArea: document.getElementById("listArea"),
      count: document.getElementById("count")
    };

    function splitInputToArray(value) {
      return String(value)
        .split(/[|、,\n]+/)
        .map(v => v.trim())
        .filter(Boolean);
    }

    function guessThemeFromBook(book) {
      const text = String(book || "").trim();
      if (text.includes("春")) return "春";
      if (text.includes("夏")) return "夏";
      if (text.includes("秋")) return "秋";
      if (text.includes("冬")) return "冬";
      if (text.includes("恋")) return "恋";
      return "雑";
    }

    function buildPoemObject() {
      const poem = {
        id: Number(el.id.value) || null,
        collection: el.collection.value.trim(),
        book: el.book.value.trim(),
        theme: el.theme.value.trim(),
        poem_no: Number(el.poem_no.value) || null,
        author: el.author.value.trim(),
        text: el.text.value.trim(),
        kana: el.kana.value.trim(),
        tokens: splitInputToArray(el.tokensInput.value)
      };

      const keywords = splitInputToArray(el.keywordsInput.value);
      if (keywords.length) {
        poem.keywords = keywords;
      }

      return poem;
    }

    function validatePoem(poem) {
      const missing = [];

      if (!poem.id) missing.push("id");
      if (!poem.collection) missing.push("collection");
      if (!poem.book) missing.push("book");
      if (!poem.theme) missing.push("theme");
      if (!poem.poem_no) missing.push("poem_no");
      if (!poem.author) missing.push("author");
      if (!poem.text) missing.push("text");
      if (!poem.kana) missing.push("kana");
      if (!Array.isArray(poem.tokens) || !poem.tokens.length) missing.push("tokens");

      return missing;
    }

    function updatePreview() {
      const poem = buildPoemObject();
      el.previewArea.textContent = JSON.stringify(poem, null, 2);
    }

    function renderList() {
      el.count.textContent = String(state.poems.length);

      if (!state.poems.length) {
        el.listArea.textContent = "まだ追加されていません。";
        return;
      }

      el.listArea.innerHTML = "";
      state.poems.forEach((poem, index) => {
        const div = document.createElement("div");
        div.className = "list-item";
        div.innerHTML = `
          <strong>${index + 1}. ${escapeHtml(poem.collection)} / ${escapeHtml(poem.book)} / 歌番号 ${poem.poem_no}</strong><br>
          ${escapeHtml(poem.author)}<br>
          ${escapeHtml(poem.text)}
        `;
        el.listArea.appendChild(div);
      });
    }

    function renderExport() {
      el.exportArea.textContent = JSON.stringify(state.poems, null, 2);
    }

    function clearForm() {
      el.id.value = "";
      el.collection.value = "";
      el.book.value = "";
      el.theme.value = "";
      el.poem_no.value = "";
      el.author.value = "";
      el.text.value = "";
      el.kana.value = "";
      el.tokensInput.value = "";
      el.keywordsInput.value = "";
      updatePreview();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function normalizeSpacing(value) {
      return String(value)
        .replace(/\s+/g, "")
        .trim();
    }

    function autoTokenizeJapanesePoem(text) {
      let working = normalizeSpacing(text);

      if (!working) return [];

      const patterns = [
        "べらなり",
        "見わたせ",
        "おどろか",
        "かたぶき",
        "あかけれ",
        "なかり",
        "すれば",
        "見えて",
        "見え",
        "知ら",
        "くらぶ",
        "いはむ",
        "来に",
        "立つ",
        "けらし",
        "ねども",
        "けども",
        "れば",
        "しも",
        "てふ",
        "けり",
        "ける",
        "ぬる",
        "なり",
        "らむ",
        "けむ",
        "つつ",
        "たり",
        "こそ",
        "なむ",
        "ぞ",
        "や",
        "か",
        "も",
        "が",
        "は",
        "を",
        "に",
        "へ",
        "と",
        "で",
        "て",
        "し",
        "ぬ",
        "つ",
        "ば",
        "ど",
        "ね"
      ];

      const uniquePatterns = [...new Set(patterns)].sort((a, b) => b.length - a.length);

      uniquePatterns.forEach((pattern) => {
        const regex = new RegExp(escapeRegExp(pattern), "g");
        working = working.replace(regex, `|${pattern}|`);
      });

      working = working
        .replace(/\|+/g, "|")
        .replace(/^\|/, "")
        .replace(/\|$/, "");

      let roughTokens = working
        .split("|")
        .map(token => token.trim())
        .filter(Boolean);

      roughTokens = splitLongResidualTokens(roughTokens);

      return roughTokens.filter(Boolean);
    }

    function splitLongResidualTokens(tokens) {
      const result = [];

      tokens.forEach((token) => {
        if (!token) return;

        if (token.length <= 3) {
          result.push(token);
          return;
        }

        const smallPatterns = [
          "夕暮",
          "苫屋",
          "かぎろひ",
          "ひととせ",
          "去年",
          "今年",
          "紅葉",
          "光",
          "月",
          "夜",
          "春",
          "夏",
          "秋",
          "冬",
          "風",
          "山",
          "沢",
          "浦",
          "野",
          "東",
          "花",
          "鴫",
          "見",
          "越え"
        ].sort((a, b) => b.length - a.length);

        let rest = token;
        let matchedAnything = false;

        while (rest.length > 0) {
          let matched = false;

          for (const pattern of smallPatterns) {
            if (rest === pattern) continue;
            if (rest.startsWith(pattern)) {
              result.push(pattern);
              rest = rest.slice(pattern.length);
              matched = true;
              matchedAnything = true;
              break;
            }
          }

          if (!matched) break;
        }

        if (matchedAnything && rest) {
          result.push(rest);
        } else if (!matchedAnything) {
          result.push(token);
        }
      });

      return result;
    }

    function confirmOverwriteTokens() {
      if (!el.tokensInput.value.trim()) return true;
      return confirm("今の tokens を上書きして下書きを作成しますか？");
    }

    function handleAutoTokenizeFromText() {
      const text = el.text.value.trim();

      if (!text) {
        alert("先に本文を入力してください。");
        return;
      }

      if (!confirmOverwriteTokens()) return;

      const tokens = autoTokenizeJapanesePoem(text);
      el.tokensInput.value = tokens.join("|");
      updatePreview();
    }

    function handleAutoTokenizeFromKana() {
      const kana = el.kana.value.trim();

      if (!kana) {
        alert("先にかなを入力してください。");
        return;
      }

      if (!confirmOverwriteTokens()) return;

      const tokens = autoTokenizeJapanesePoem(kana);
      el.tokensInput.value = tokens.join("|");
      updatePreview();
    }

    el.previewButton.addEventListener("click", updatePreview);

    el.fillThemeButton.addEventListener("click", () => {
      el.theme.value = guessThemeFromBook(el.book.value);
      updatePreview();
    });

    el.autoTokenizeButton.addEventListener("click", handleAutoTokenizeFromText);
    el.autoTokenizeKanaButton.addEventListener("click", handleAutoTokenizeFromKana);

    el.addButton.addEventListener("click", () => {
      const poem = buildPoemObject();
      const missing = validatePoem(poem);

      if (missing.length) {
        alert("未入力があります: " + missing.join(", "));
        return;
      }

      state.poems.push(poem);
      renderList();
      renderExport();
      clearForm();

      el.id.value = state.poems.length
        ? String(Math.max(...state.poems.map(p => p.id || 0)) + 1)
        : "1";
    });

    el.clearButton.addEventListener("click", clearForm);

    el.exportButton.addEventListener("click", renderExport);

    el.copyButton.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(JSON.stringify(state.poems, null, 2));
        alert("JSONをコピーしました。");
      } catch {
        alert("コピーに失敗しました。");
      }
    });

    el.resetAllButton.addEventListener("click", () => {
      if (!confirm("追加済みデータを全て消しますか？")) return;
      state.poems = [];
      renderList();
      renderExport();
    });

    [
      el.id, el.collection, el.book, el.theme, el.poem_no, el.author,
      el.text, el.kana, el.tokensInput, el.keywordsInput
    ].forEach(input => {
      input.addEventListener("input", updatePreview);
    });

    el.id.value = "1";
    updatePreview();
    renderList();
    renderExport();
  </script>
</body>
</html>
