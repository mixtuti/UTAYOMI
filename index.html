<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>和歌コーパス検索</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <p class="eyebrow">和歌・俳句企画向け</p>
      <h1>和歌コーパス検索</h1>
      <p class="lead">
        万葉集・古今和歌集・新古今和歌集などをもとに、語句検索や後続語の傾向、
        季節・詠み人・季語ごとの絞り込みを行えます。
      </p>
    </div>
  </header>

  <main class="container main-grid">
    <section class="card hero-card full-width">
      <div class="section-head">
        <h2>今日の一首</h2>
        <div class="button-row">
          <button id="shufflePoemButton" class="button secondary" type="button">別の一首</button>
        </div>
      </div>

      <div id="randomPoem" class="random-poem">
        <p>読み込み中...</p>
      </div>

      <div class="quick-links">
        <h3>すぐ探す</h3>
        <div class="tag-row">
          <button class="tag-button" type="button" data-theme="春">春</button>
          <button class="tag-button" type="button" data-theme="夏">夏</button>
          <button class="tag-button" type="button" data-theme="秋">秋</button>
          <button class="tag-button" type="button" data-theme="冬">冬</button>
          <button class="tag-button" type="button" data-theme="恋">恋</button>
        </div>
      </div>
    </section>

    <section class="card controls-card">
      <h2>語句検索</h2>

      <form id="searchForm" class="control-stack">
        <label>
          <span>検索語</span>
          <input id="searchInput" type="text" placeholder="例: 月、春、暁の" />
        </label>

        <div class="control-grid">
          <label>
            <span>出典</span>
            <select id="collectionFilter">
              <option value="">すべて</option>
            </select>
          </label>

          <label>
            <span>部立</span>
            <select id="themeFilter">
              <option value="">すべて</option>
              <option value="春">春</option>
              <option value="夏">夏</option>
              <option value="秋">秋</option>
              <option value="冬">冬</option>
              <option value="恋">恋</option>
              <option value="雑">雑</option>
              <option value="相聞">相聞</option>
              <option value="挽歌">挽歌</option>
            </select>
          </label>

          <label>
            <span>季節</span>
            <select id="seasonFilter">
              <option value="">すべて</option>
              <option value="春">春</option>
              <option value="夏">夏</option>
              <option value="秋">秋</option>
              <option value="冬">冬</option>
            </select>
          </label>

          <label>
            <span>季語</span>
            <select id="kigoFilter">
              <option value="">すべて</option>
            </select>
          </label>
        </div>

        <div class="control-grid">
          <label>
            <span>詠み人</span>
            <select id="authorFilter">
              <option value="">すべて</option>
            </select>
          </label>
        </div>

        <label class="checkbox-row">
          <input id="kanaSearchToggle" type="checkbox" />
          <span>かな欄も検索する</span>
        </label>

        <div class="button-row">
          <button type="submit" class="button">検索する</button>
          <button id="clearSearchButton" type="button" class="button secondary">クリア</button>
        </div>
      </form>

      <div class="sub-panel">
        <h3>人気語句</h3>
        <div class="tag-row">
          <button class="tag-button" type="button" data-keyword="月">月</button>
          <button class="tag-button" type="button" data-keyword="花">花</button>
          <button class="tag-button" type="button" data-keyword="春">春</button>
          <button class="tag-button" type="button" data-keyword="秋">秋</button>
          <button class="tag-button" type="button" data-keyword="夢">夢</button>
          <button class="tag-button" type="button" data-keyword="雪">雪</button>
        </div>
      </div>
    </section>

    <section class="card controls-card">
      <h2>後続語検索</h2>

      <form id="ngramForm" class="control-stack">
        <label>
          <span>起点語</span>
          <input id="ngramInput" type="text" placeholder="例: 暁の、月、春の" />
        </label>

        <div class="button-row">
          <button type="submit" class="button">次に来やすい語を見る</button>
        </div>
      </form>

      <div id="ngramResults" class="ngram-results empty-state">
        語を入力すると、次に来やすい語のランキングを表示します。
      </div>
    </section>

    <section class="card results-card full-width">
      <div class="section-head">
        <div>
          <h2>検索結果</h2>
          <p id="searchSummary" class="muted">まだ検索していません。</p>
        </div>

        <div class="result-options">
          <label class="checkbox-row compact">
            <input id="highlightToggle" type="checkbox" checked />
            <span>検索語をハイライト</span>
          </label>

          <!-- <label class="checkbox-row compact">
            <input id="verticalModeToggle" type="checkbox" />
            <span>縦書き風表示</span>
          </label> -->
        </div>
      </div>

      <div id="activeFilters" class="active-filters" aria-live="polite"></div>

      <div id="searchResults" class="results-list empty-state">
        ここに検索結果が表示されます。
      </div>
      <div id="pagination" class="pagination"></div>
    </section>
  </main>

  <template id="poemCardTemplate">
    <article class="poem-card">
      <div class="poem-meta"></div>
      <p class="poem-text"></p>
      <p class="poem-kana"></p>
      <div class="poem-tags"></div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
